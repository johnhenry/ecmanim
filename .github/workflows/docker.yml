# Build + push the render-service image to ghcr.io on every release (and on
# demand). The in-image smoke runs `checkhealth` so a broken ffmpeg/canvas
# layer fails the build, not the first render.

name: docker

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-service
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ecmanim-service:smoke

      - name: Smoke test (checkhealth inside the image)
        run: docker run --rm --entrypoint node ecmanim-service:smoke dist/bin/ecmanim.js checkhealth

      - name: Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
