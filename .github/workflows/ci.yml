name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: npm ci

      - run: npm run type-check

      - run: npm test

      - run: npm run build
