name: Deploy Documentation

# Manual trigger only — no auto-deploy-on-push until explicitly enabled.
# Requires repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
# (Workers Scripts:Edit scope) before this can actually run.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root package (builds dist/ for the live browser demo)
        run: npm ci

      - name: Install docs site dependencies
        run: npm ci
        working-directory: website

      - name: Build documentation
        run: npm run build
        working-directory: website
        env:
          NODE_ENV: production

      - name: Deploy
        run: npx wrangler deploy
        working-directory: website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
