[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "manim-portable-plugins"
version = "1.0.0"
description = "Load portable manim plugin manifests (colors, rate functions, parametric surfaces, SVG shapes) into Python manim. The same manifest loads into manim-js."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "manim-js" }]
keywords = ["manim", "plugin", "manifest", "animation", "portable"]

# `manim` is an optional runtime dependency: the expression evaluator works with
# the standard library alone; only `load_manifest` needs manim installed.
dependencies = []

[project.optional-dependencies]
manim = ["manim>=0.18"]

# manim discovers plugins through the `manim.plugins` entry-point group.
[project.entry-points."manim.plugins"]
portable = "manim_portable_plugins"

[tool.setuptools]
packages = ["manim_portable_plugins"]
